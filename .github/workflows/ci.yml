name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Test
        run: pnpm test

  bundle-size:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build PR branch
        run: pnpm build

      - name: Snapshot PR sizes
        run: |
          mkdir -p /tmp/sizes
          node -e '
            const fs = require("fs"); const path = require("path");
            function dirSize(d){let s=0;if(!fs.existsSync(d))return 0;for(const f of fs.readdirSync(d,{recursive:true})){const p=path.join(d,f);if(fs.statSync(p).isFile())s+=fs.statSync(p).size}return s}
            function topChunks(d,n){if(!fs.existsSync(d))return [];return fs.readdirSync(d,{recursive:true}).filter(f=>f.endsWith(".js")).map(f=>({name:f,size:fs.statSync(path.join(d,f)).size})).sort((a,b)=>b.size-a.size).slice(0,n)}
            const out = {
              static: dirSize(".next/static"),
              chunks: dirSize(".next/static/chunks"),
              css: dirSize(".next/static/css"),
              top: topChunks(".next/static/chunks", 5),
            };
            fs.writeFileSync("/tmp/sizes/pr.json", JSON.stringify(out));
          '

      - name: Checkout base branch
        run: |
          git checkout ${{ github.base_ref }}
          git clean -fdx -e node_modules -e /tmp

      - run: pnpm install --frozen-lockfile

      - name: Build base branch
        run: pnpm build

      - name: Snapshot base sizes
        run: |
          node -e '
            const fs = require("fs"); const path = require("path");
            function dirSize(d){let s=0;if(!fs.existsSync(d))return 0;for(const f of fs.readdirSync(d,{recursive:true})){const p=path.join(d,f);if(fs.statSync(p).isFile())s+=fs.statSync(p).size}return s}
            function topChunks(d,n){if(!fs.existsSync(d))return [];return fs.readdirSync(d,{recursive:true}).filter(f=>f.endsWith(".js")).map(f=>({name:f,size:fs.statSync(path.join(d,f)).size})).sort((a,b)=>b.size-a.size).slice(0,n)}
            const out = {
              static: dirSize(".next/static"),
              chunks: dirSize(".next/static/chunks"),
              css: dirSize(".next/static/css"),
              top: topChunks(".next/static/chunks", 5),
            };
            fs.writeFileSync("/tmp/sizes/base.json", JSON.stringify(out));
          '

      - name: Comment diff
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = JSON.parse(fs.readFileSync('/tmp/sizes/pr.json'));
            const base = JSON.parse(fs.readFileSync('/tmp/sizes/base.json'));

            const fmt = (b) => b > 1024 * 1024
              ? (b / 1024 / 1024).toFixed(2) + ' MB'
              : (b / 1024).toFixed(1) + ' KB';

            const fmtDelta = (delta) => {
              if (delta === 0) return '✅ unchanged';
              const sign = delta > 0 ? '+' : '';
              const icon = delta > 50 * 1024 ? '🚨' : delta > 0 ? '⚠️' : '✅';
              return `${icon} ${sign}${fmt(delta)}`;
            };

            const row = (label, baseSize, prSize) => {
              const delta = prSize - baseSize;
              const pct = baseSize > 0 ? ((delta / baseSize) * 100).toFixed(1) : '—';
              return `| ${label} | ${fmt(baseSize)} | ${fmt(prSize)} | ${fmtDelta(delta)} (${pct}%) |`;
            };

            let body = '## 📦 Bundle Size Report\n\n';
            body += `Comparing **${context.payload.pull_request.head.sha.slice(0,7)}** against base **${context.payload.pull_request.base.sha.slice(0,7)}**.\n\n`;
            body += '### Overview\n\n';
            body += '| Metric | Base | PR | Δ |\n|---|---|---|---|\n';
            body += row('Total static', base.static, pr.static) + '\n';
            body += row('JavaScript', base.chunks, pr.chunks) + '\n';
            body += row('CSS', base.css, pr.css) + '\n';
            body += '\n';

            body += '### Top 5 chunks (PR branch)\n\n';
            body += '| Chunk | Size |\n|---|---|\n';
            for (const { name, size } of pr.top) {
              body += `| \`${name}\` | ${fmt(size)} |\n`;
            }

            // Find existing report comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body && c.body.startsWith('## 📦 Bundle Size Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
