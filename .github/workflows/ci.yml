name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Test
        run: pnpm test

  bundle-size:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Report bundle size
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read Next.js build output
            const routesManifest = JSON.parse(
              fs.readFileSync('.next/routes-manifest.json', 'utf8')
            );

            // Get .next/static size
            function getDirSize(dir) {
              let size = 0;
              if (!fs.existsSync(dir)) return 0;
              for (const file of fs.readdirSync(dir, { recursive: true })) {
                const filePath = path.join(dir, file);
                const stat = fs.statSync(filePath);
                if (stat.isFile()) size += stat.size;
              }
              return size;
            }

            const staticSize = getDirSize('.next/static');
            const formatSize = (bytes) => {
              if (bytes > 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + ' MB';
              return (bytes / 1024).toFixed(1) + ' KB';
            };

            // Read build manifest for JS bundles
            const buildManifest = JSON.parse(
              fs.readFileSync('.next/build-manifest.json', 'utf8')
            );
            const pages = Object.keys(buildManifest.pages);

            let report = '## 📦 Bundle Size Report\n\n';
            report += `| Metric | Size |\n|--------|------|\n`;
            report += `| Total static assets | ${formatSize(staticSize)} |\n`;
            report += `| Routes | ${pages.length} |\n\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
