name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:check

      - name: Test
        run: pnpm test

  bundle-size:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Report bundle size
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function getDirSize(dir) {
              let size = 0;
              if (!fs.existsSync(dir)) return 0;
              for (const file of fs.readdirSync(dir, { recursive: true })) {
                const filePath = path.join(dir, file);
                const stat = fs.statSync(filePath);
                if (stat.isFile()) size += stat.size;
              }
              return size;
            }

            function getFileSize(filePath) {
              if (!fs.existsSync(filePath)) return 0;
              return fs.statSync(filePath).size;
            }

            const fmt = (bytes) => {
              if (bytes > 1024 * 1024) return (bytes / 1024 / 1024).toFixed(2) + ' MB';
              return (bytes / 1024).toFixed(1) + ' KB';
            };

            const staticSize = getDirSize('.next/static');
            const jsSize = getDirSize('.next/static/chunks');
            const cssSize = getDirSize('.next/static/css');

            // Top 5 largest chunks
            const chunksDir = '.next/static/chunks';
            let chunkRows = '';
            if (fs.existsSync(chunksDir)) {
              const chunks = fs.readdirSync(chunksDir, { recursive: true })
                .filter(f => f.endsWith('.js'))
                .map(f => ({ name: f, size: getFileSize(path.join(chunksDir, f)) }))
                .sort((a, b) => b.size - a.size)
                .slice(0, 5);

              for (const { name, size } of chunks) {
                chunkRows += `| \`${name}\` | ${fmt(size)} |\n`;
              }
            }

            let report = '## 📦 Bundle Size Report\n\n';
            report += '### Overview\n\n';
            report += `| Metric | Size |\n|--------|------|\n`;
            report += `| Total static assets | ${fmt(staticSize)} |\n`;
            report += `| JavaScript | ${fmt(jsSize)} |\n`;
            report += `| CSS | ${fmt(cssSize)} |\n\n`;

            report += '### Top 5 Largest Chunks\n\n';
            report += `| Chunk | Size |\n|-------|------|\n`;
            report += chunkRows;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
